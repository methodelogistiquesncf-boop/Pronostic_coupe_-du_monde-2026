<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Gestion Coupe du monde</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="pronostics.html">⚽ Mes Pronos</a>
        <a href="classement.html">🏆 Classement</a>
        <a href="admin.html" style="color: #ff4757;">🛠️ Admin</a>
        <a href="#" id="btn-logout">🚪 Déconnexion</a>
    </nav>

    <div class="container">
        <div class="card" style="border: 2px dashed #2ec4b6;">
            <h2>Configuration Automatique</h2>
            <p style="font-size: 0.9em; color: var(--text-muted); text-align: center;">
                Clique sur ce bouton pour charger automatiquement les vrais premiers matchs de la compétition dans ta base Firebase.
            </p>
            <button id="btn-injecter-tout" style="background-color: #2ec4b6;">🚀 Injecter le Calendrier Officiel</button>
        </div>

        <div class="card">
            <h2>Créer un Match Manuel</h2>
            <input type="text" id="add-groupe" placeholder="Groupe (ex: Groupe A, Groupe I...)">
            <input type="text" id="add-teamA" placeholder="Équipe A">
            <input type="text" id="add-teamB" placeholder="Équipe B">
            <input type="datetime-local" id="add-date">
            <button id="btn-create-match">Ajouter le match</button>
        </div>

        <div class="card">
            <h2>Clôturer et Calculer les points</h2>
            <div id="admin-matches-list">Chargement...</div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { collection, addDoc, getDocs, doc, updateDoc, getDoc, Timestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const UID_ADMIN_UNIQUE = "tYvyTn0PmhMbDpkjSwwEh2EjvYT2"; 

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "index.html";
            } else if (user.uid !== UID_ADMIN_UNIQUE) {
                alert("Accès refusé ! Tu n'es pas l'administrateur.");
                window.location.href = "pronostics.html";
            } else {
                loadAdminMatches();
            }
        });

        // ==========================================
        // LE SCRIPT D'INJECTION DU CALENDRIER REEL
        // ==========================================
        document.getElementById('btn-injecter-tout').addEventListener('click', async () => {
            if(!confirm("Veux-tu vraiment injecter les matchs officiels dans ta base de données ?")) return;

            // Liste des matchs officiels de la phase de poules
            const calendrierOfficiel = [
                // GROUPE A
                { groupe: "Groupe A", equipeA: "Mexique", equipeB: "Afrique du Sud", date: "2026-06-11T19:00:00", statut: "futur", scoreA: null, scoreB: null },
                { groupe: "Groupe A", equipeA: "Corée du Sud", equipeB: "République tchèque", date: "2026-06-12T14:00:00", statut: "futur", scoreA: null, scoreB: null },
                { groupe: "Groupe A", equipeA: "Mexique", equipeB: "Corée du Sud", date: "2026-06-17T17:00:00", statut: "futur", scoreA: null, scoreB: null },
                { groupe: "Groupe A", equipeA: "République tchèque", equipeB: "Afrique du Sud", date: "2026-06-17T20:00:00", statut: "futur", scoreA: null, scoreB: null },
                
                // GROUPE B
                { groupe: "Groupe B", equipeA: "Canada", equipeB: "Bosnie-Herzégovine", date: "2026-06-12T17:00:00", statut: "futur", scoreA: null, scoreB: null },
                { groupe: "Groupe B", equipeA: "Qatar", equipeB: "Suisse", date: "2026-06-12T20:00:00", statut: "futur", scoreA: null, scoreB: null },
                
                // GROUPE C
                { groupe: "Groupe C", equipeA: "Brésil", equipeB: "Maroc", date: "2026-06-13T14:00:00", statut: "futur", scoreA: null, scoreB: null },
                { groupe: "Groupe C", equipeA: "Haïti", equipeB: "Écosse", date: "2026-06-13T17:00:00", statut: "futur", scoreA: null, scoreB: null },
                
                // GROUPE D
                { groupe: "Groupe D", equipeA: "États-Unis", equipeB: "Paraguay", date: "2026-06-13T20:00:00", statut: "futur", scoreA: null, scoreB: null },
                { groupe: "Groupe D", equipeA: "Australie", equipeB: "Turquie", date: "2026-06-14T14:00:00", statut: "futur", scoreA: null, scoreB: null },
                
                // GROUPE I (Groupe de la France 🇫🇷)
                { groupe: "Groupe I", equipeA: "France", equipeB: "Sénégal", date: "2026-06-15T18:00:00", statut: "futur", scoreA: null, scoreB: null },
                { groupe: "Groupe I", equipeA: "Irak", equipeB: "Norvège", date: "2026-06-15T21:00:00", statut: "futur", scoreA: null, scoreB: null },
                { groupe: "Groupe I", equipeA: "France", equipeB: "Irak", date: "2026-06-20T15:00:00", statut: "futur", scoreA: null, scoreB: null },
                { groupe: "Groupe I", equipeA: "Norvège", equipeB: "Sénégal", date: "2026-06-20T18:00:00", statut: "futur", scoreA: null, scoreB: null }
            ];

            try {
                let compteur = 0;
                for (const match of calendrierOfficiel) {
                    await addDoc(collection(db, "matches"), {
                        groupe: match.groupe,
                        equipeA: match.equipeA,
                        equipeB: match.equipeB,
                        scoreA: match.scoreA,
                        scoreB: match.scoreB,
                        statut: match.statut,
                        // Conversion de la date texte en Timestamp Firebase
                        dateLimite: Timestamp.fromDate(new Date(match.date))
                    });
                    compteur++;
                }
                alert(`${compteur} matchs officiels ont été injectés avec succès ! 🚀`);
                location.reload();
            } catch (error) {
                alert("Erreur lors de l'injection : " + error.message);
            }
        });

        // Ajouter un match manuellement
        document.getElementById('btn-create-match').addEventListener('click', async () => {
            const groupe = document.getElementById('add-groupe').value.trim();
            const eqA = document.getElementById('add-teamA').value.trim();
            const eqB = document.getElementById('add-teamB').value.trim();
            const dateVal = document.getElementById('add-date').value;

            if(!groupe || !eqA || !eqB || !dateVal) return alert("Remplis tous les champs !");

            await addDoc(collection(db, "matches"), {
                groupe: groupe,
                equipeA: eqA,
                equipeB: eqB,
                scoreA: null,
                scoreB: null,
                dateLimite: Timestamp.fromDate(new Date(dateVal)),
                statut: "futur"
            });
            alert("Match ajouté manuellement ! ✅");
            location.reload();
        });

        async function loadAdminMatches() {
            const q = query(collection(db, "matches"), orderBy("groupe"), orderBy("dateLimite"));
            const snap = await getDocs(q);
            const container = document.getElementById('admin-matches-list');
            container.innerHTML = "";

            if(snap.empty) {
                container.innerHTML = "<p>Aucun match en base de données.</p>";
                return;
            }

            snap.forEach(matchDoc => {
                const match = matchDoc.data();
                const mId = matchDoc.id;

                const div = document.createElement('div');
                div.className = "card";
                div.style.background = "#0f3460";
                div.innerHTML = `
                    <small style="color: var(--primary); font-weight: bold; display: block; text-align: center;">${match.groupe || 'Sans Groupe'}</small>
                    <p style="text-align:center; font-weight:bold; margin-top: 5px;">${match.equipeA} VS ${match.equipeB}</p>
                    <div style="display:flex; gap:10px; justify-content:center;">
                        <input type="number" id="finalA-${mId}" placeholder="Score A" value="${match.scoreA !== null ? match.scoreA : ''}" style="width:70px;">
                        <input type="number" id="finalB-${mId}" placeholder="Score B" value="${match.scoreB !== null ? match.scoreB : ''}" style="width:70px;">
                    </div>
                    <button id="btn-calc-${mId}">${match.statut === 'termine' ? '🔄 Recalculer les points' : '🏆 Valider & Calculer'}</button>
                `;
                container.appendChild(div);

                document.getElementById(`btn-calc-${mId}`).addEventListener('click', () => calculerPointsMatch(mId, match));
            });
        }

        async function calculerPointsMatch(matchId, matchData) {
            const resA = parseInt(document.getElementById(`finalA-${matchId}`).value);
            const resB = parseInt(document.getElementById(`finalB-${matchId}`).value);

            if(isNaN(resA) || isNaN(resB)) return alert("Saisis un score valide !");

            await updateDoc(doc(db, "matches", matchId), {
                scoreA: resA,
                scoreB: resB,
                statut: "termine"
            });

            const issueReelle = resA > resB ? "1" : resA < resB ? "2" : "N";
            const q = query(collection(db, "predictions"), where("matchId", "==", matchId));
            const pronoSnapshot = await getDocs(q);

            for (const pronoDoc of pronoSnapshot.docs) {
                const prono = pronoDoc.data();
                let pointsProno = 0;

                const pronoIssue = prono.pronoA > prono.pronoB ? "1" : prono.pronoA < prono.pronoB ? "2" : "N";

                if (pronoIssue === issueReelle) {
                    pointsProno += 2;
                    if (prono.pronoA === resA && prono.pronoB === resB) {
                        pointsProno += 3;
                    }
                }

                const ancienPoints = prono.pointsGagnes || 0;
                const diffPoints = pointsProno - ancienPoints;

                await updateDoc(doc(db, "predictions", pronoDoc.id), { pointsGagnes: pointsProno });

                const userRef = doc(db, "users", prono.userId);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const nouveauxPointsTotaux = (userSnap.data().pointsTotaux || 0) + diffPoints;
                    await updateDoc(userRef, { pointsTotaux: nouveauxPointsTotaux });
                }
            }

            alert("Classement mis à jour avec succès ! 🚀");
            loadAdminMatches();
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = "index.html");
        });
    </script>
</body>
</html>
