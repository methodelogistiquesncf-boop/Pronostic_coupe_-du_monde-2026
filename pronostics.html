<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Pronostics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="pronostics.html">⚽ Mes Pronos</a>
        <a href="classement.html">🏆 Classement</a>
        <a href="admin.html" id="nav-admin" style="display: none; color: #ff4757;">🛠️ Admin</a>
        <a href="#" id="btn-logout">🚪 Déconnexion</a>
    </nav>

    <div class="container">
        <h2>Saisir mes Pronostics</h2>
        <div id="matches-list">Chargement des matchs...</div>
        <button id="btn-save-all" style="display:none; background-color: #2ec4b6;">💾 Tout Enregistrer</button>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { collection, getDocs, doc, setDoc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const matchesList = document.getElementById('matches-list');
        const btnSaveAll = document.getElementById('btn-save-all');
        const navAdmin = document.getElementById('nav-admin');

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }

            if (user.uid === "tYvyTn0PmhMbDpkjSwwEh2EjvYT2") {
                navAdmin.style.display = "block";
            }

            // On récupère les matchs triés par groupe, puis par date
            const q = query(collection(db, "matches"), orderBy("groupe"), orderBy("dateLimite"));
            const matchesSnapshot = await getDocs(q);
            matchesList.innerHTML = "";
            
            if(matchesSnapshot.empty) {
                matchesList.innerHTML = "<p style='text-align:center;'>Aucun match disponible pour le moment.</p>";
                return;
            }

            btnSaveAll.style.display = "block";

            let dernierGroupeAffiche = "";

            for (const matchDoc of matchesSnapshot.docs) {
                const match = matchDoc.data();
                const matchId = matchDoc.id;
                const isBloque = new Date() > match.dateLimite.toDate();

                // Si c'est un nouveau groupe, on ajoute un titre de séparation dans la liste
                if (match.groupe !== dernierGroupeAffiche) {
                    dernierGroupeAffiche = match.groupe;
                    const groupHeader = document.createElement('h3');
                    groupHeader.style.color = '#2ec4b6';
                    groupHeader.style.marginTop = '30px';
                    groupHeader.style.borderBottom = '2px solid #2ec4b6';
                    groupHeader.style.paddingBottom = '5px';
                    groupHeader.innerText = dernierGroupeAffiche;
                    matchesList.appendChild(groupHeader);
                }

                const pronoRef = doc(db, "predictions", `${user.uid}_${matchId}`);
                const pronoSnap = await getDoc(pronoRef);
                let pronoA = "";
                let pronoB = "";

                if (pronoSnap.exists()) {
                    pronoA = pronoSnap.data().pronoA;
                    pronoB = pronoSnap.data().pronoB;
                }

                const matchCard = document.createElement('div');
                matchCard.className = "card";
                matchCard.innerHTML = `
                    <div class="match-row">
                        <span class="team">${match.equipeA}</span>
                        <div class="score-inputs">
                            <input type="number" id="pronoA-${matchId}" value="${pronoA}" min="0" ${isBloque ? 'disabled' : ''}>
                            <span>-</span>
                            <input type="number" id="pronoB-${matchId}" value="${pronoB}" min="0" ${isBloque ? 'disabled' : ''}>
                        </div>
                        <span class="team right">${match.equipeB}</span>
                    </div>
                    <small style="color: var(--text-muted); display:block; text-align:center; margin-top:5px;">
                        ${isBloque ? "❌ Verrouillé (Match démarré)" : `⏳ Limite : ${match.dateLimite.toDate().toLocaleString('fr-FR')}`}
                    </small>
                `;
                matchesList.appendChild(matchCard);
            }

            btnSaveAll.onclick = async () => {
                for (const matchDoc of matchesSnapshot.docs) {
                    const matchId = matchDoc.id;
                    const match = matchDoc.data();
                    if (new Date() > match.dateLimite.toDate()) continue;

                    const valA = document.getElementById(`pronoA-${matchId}`).value;
                    const valB = document.getElementById(`pronoB-${matchId}`).value;

                    if (valA !== "" && valB !== "") {
                        await setDoc(doc(db, "predictions", `${user.uid}_${matchId}`), {
                            userId: user.uid,
                            userName: user.displayName,
                            matchId: matchId,
                            pronoA: parseInt(valA),
                            pronoB: parseInt(valB),
                            pointsGagnes: 0
                        }, { merge: true });
                    }
                }
                alert("Pronostics enregistrés ! ✅");
            };
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = "index.html");
        });
    </script>
</body>
</html>
